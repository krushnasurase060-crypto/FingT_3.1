<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>FingT | Flute</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="BG_video.mp4" type="video/mp4">
  </video>
  <div class="app-wrapper">
    <header class="app-header">
      <div class="logo">
        <img src="Fing_T_Logo.png" alt="FingT Logo" class="logo-img">
      </div>
      <nav class="main-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="piano.html" class="nav-link">Piano</a>
        <a href="flute.html" class="nav-link active">Flute</a>
        <a href="advanced.html" class="nav-link">Advanced</a>
        <a href="rhythm.html" class="nav-link">Rhythm</a>
        <a href="settings.html" class="nav-link">Settings</a>
        <a href="about.html" class="nav-link">About</a>
      </nav>
    </header>

    <!-- Mobile Device Warning Alert -->
    <div id="mobileWarningAlert" class="mobile-warning-alert" style="display: none;">
      <div class="alert-content">
        <span class="alert-icon">⚠️</span>
        <span class="alert-message">Better to use this mode on DESKTOP for best experience</span>
        <button id="closeAlertBtn" class="alert-close" aria-label="Close alert">&times;</button>
      </div>
    </div>

    <main class="trainer-container">
      <h1 class="mode-title">🪈 Flute Mode | 4 Keys | Feel the Tone</h1>

      <!-- Sequence Builder Area -->
      <section class="sequence-section card">
        <div class="section-header">
          <h2>Your Sequence</h2>
          <div class="sequence-actions">
            <button id="clearSeqBtn" class="btn-secondary" aria-label="Clear sequence">Clear</button>
            <button id="removeLastBtn" class="btn-secondary" aria-label="Remove last">↩️</button>
          </div>
        </div>
        <div id="sequenceDisplay" class="sequence-display">
          <!-- Sequence chips dynamically inserted -->
        </div>
        <p class="hint">Click keys to build your sequence — flute sound will play</p>
      </section>

      <!-- Keypad -->
      <section class="keypad-section">
        <div id="keypadContainer" class="keypad-grid">
          <!-- Populated with 4 keys -->
        </div>
      </section>

      <!-- Training Controls & Timer -->
      <section class="training-panel card">
        <div class="timer-area">
          <span class="timer-label">⏱️</span>
          <span id="timerDisplay" class="timer-value">00.0 s</span>
        </div>
        <div class="progress-container">
          <div id="progressBar" class="progress-bar" style="width: 0%;"></div>
        </div>
        <div class="control-group">
          <button id="startBtn" class="btn-primary">▶ Start</button>
          <button id="resetBtn" class="btn-secondary">↻ Reset</button>
        </div>
        <div id="stateMessage" class="state-message"></div>
      </section>
    </main>

    <footer class="app-footer">
      <span>Made for musicians | Idea By Krushna</span>
    </footer>
  </div>

  <!-- Modal Popup -->
  <div id="popupModal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
      <p id="popupMessage"></p>
      <button id="popupCloseBtn" class="btn-primary">OK</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Mobile Device Detection and Warning Alert
    function detectDevice() {
      const userAgent = navigator.userAgent.toLowerCase();
      const mobileKeywords = ['mobile', 'android', 'iphone', 'ipad', 'windows phone', 'blackberry', 'tablet', 'kindle'];
      return mobileKeywords.some(keyword => userAgent.includes(keyword));
    }

    function showMobileWarningAlert() {
      const isMobile = detectDevice();
      if (isMobile) {
        const alertElement = document.getElementById('mobileWarningAlert');
        const closeBtn = document.getElementById('closeAlertBtn');
        
        if (alertElement) {
          alertElement.style.display = 'block';
          
          // Auto-dismiss after 5 seconds
          const timeoutId = setTimeout(() => {
            alertElement.classList.add('fade-out');
            setTimeout(() => {
              alertElement.style.display = 'none';
              alertElement.classList.remove('fade-out');
            }, 400);
          }, 5000);
          
          // Manual close button
          if (closeBtn) {
            closeBtn.addEventListener('click', () => {
              clearTimeout(timeoutId);
              alertElement.classList.add('fade-out');
              setTimeout(() => {
                alertElement.style.display = 'none';
                alertElement.classList.remove('fade-out');
              }, 400);
            });
          }
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Show mobile warning alert
      showMobileWarningAlert();
      
      if (typeof FingT !== 'undefined') {
        FingT.init({
          mode: 'flute',
          keyCount: 4,
          soundType: 'flute',
          predefined: null
        });
      } else {
        console.error('FingT core not loaded');
      }
    });
  </script>
</body>
</html>
